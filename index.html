<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ঈদুল ফিতর | সালামী অ্যাপ</title>
  
  <meta property="og:title" content="ঈদ মোবারক | স্পেশাল সালামী! 🎁">
  <meta property="og:description" content="ঈদের খুশি দ্বিগুণ হোক! তাড়াতাড়ি লিংকে ক্লিক করে তোমার সালামী গ্রহণ করো।">
  <meta property="og:image" content="https://bd-live-21.slatic.net/kf/S52360f42a1d0440ca35132260bf7fa2dI.jpg">
  <meta property="og:type" content="website">
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ঈদ মোবারক | স্পেশাল সালামী! 🎁">
  <meta name="twitter:description" content="ঈদের খুশি দ্বিগুণ হোক! তাড়াতাড়ি লিংকে ক্লিক করে তোমার সালামী গ্রহণ করো।">
  <meta name="twitter:image" content="https://bd-live-21.slatic.net/kf/S52360f42a1d0440ca35132260bf7fa2dI.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <style>
    /* বেসিক ভেরিয়েবল সেটআপ */
    :root {
      --bg-body: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
      --primary-blue: #3498db;
      --primary-blue-hover: #2980b9;
      --confetti-glow: rgba(0,0,0,0.15);
    }

    /* থিম ১: সিলভার হোয়াইট (ডিফল্ট) */
    .theme-1 {
      --card-bg: linear-gradient(135deg, #ffffff 0%, #f1f2f6 100%);
      --text-main: #2f3640;
      --text-muted: #718093;
      --primary-btn: #e1b12c;
      --primary-btn-hover: #fbc531;
      --info-bg: rgba(225, 177, 44, 0.1);
      --border-color: #dcdde1;
    }

    /* থিম ২: রোজ পিচ */
    .theme-2 {
      --card-bg: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);
      --text-main: #2d3436;
      --text-muted: #636e72;
      --primary-btn: #e17055;
      --primary-btn-hover: #d63031;
      --info-bg: rgba(255, 255, 255, 0.5);
      --border-color: #e17055;
    }

    /* থিম ৩: নাইট গ্রিন */
    .theme-3 {
      --card-bg: linear-gradient(135deg, #093028 0%, #237A57 100%);
      --text-main: #ffffff;
      --text-muted: #d1d8e0;
      --primary-btn: #f1c40f;
      --primary-btn-hover: #f39c12;
      --info-bg: rgba(255, 255, 255, 0.1);
      --border-color: #27ae60;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg-body);
      font-family: 'Hind Siliguri', sans-serif;
      text-align: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .app-card {
      background: var(--card-bg);
      color: var(--text-main);
      padding: 40px 25px;
      border-radius: 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
      transform: translateY(0px);
      animation: appCardFloat 6s ease-in-out infinite;
      position: relative;
      transition: background 0.5s ease, color 0.5s ease;
    }

    @keyframes appCardFloat {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    h1 {
      font-size: 2.2em;
      font-weight: 700;
      margin-bottom: 5px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }
    
    .eid-label {
      font-size: 0.9em;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    p#subtitle {
      font-size: 1.2em;
      line-height: 1.6;
      font-weight: 500;
      margin-bottom: 35px;
      color: var(--text-main);
      opacity: 0.9;
    }

    .btn-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 25px;
    }

    .btn {
      color: #fff;
      border: none;
      padding: 16px 30px;
      font-size: 1.2em;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 15px var(--confetti-glow);
      width: 100%;
      outline: none;
    }
    
    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: var(--primary-btn);
      color: #111;
    }
    .btn-primary:hover { background: var(--primary-btn-hover); }

    .theme-1 .btn-primary, .theme-3 .btn-primary { color: #111; }
    .theme-2 .btn-primary { color: #fff; } 

    .btn-secondary { background: var(--primary-blue); color: #fff; }
    .btn-secondary:hover { background: var(--primary-blue-hover); }

    #result, #createSection {
      display: none;
      margin-top: 30px;
      padding: 20px;
      background: var(--info-bg);
      border: 1px dashed var(--border-color);
      border-radius: 15px;
      animation: appPopUp 0.6s ease-out;
    }

    @keyframes appPopUp {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .info-box {
      background: var(--info-bg);
      padding: 15px;
      border-radius: 12px;
      text-align: left;
      margin-bottom: 20px;
      font-size: 1.1em;
      border: 1px solid var(--border-color);
    }
    
    .funny-text {
      font-weight: 700;
      font-size: 1.45em;
      margin: 20px 0;
      line-height: 1.4;
      color: var(--text-main);
    }
    
    .ps-text {
      font-size: 1em;
      color: var(--text-muted);
      margin-top: 20px;
      font-style: italic;
    }

    .form-group {
      text-align: left;
      margin-bottom: 15px;
    }
    
    .form-label {
      font-weight: 600;
      font-size: 1.05em;
      margin-bottom: 6px;
      display: block;
      color: var(--text-main);
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-size: 1.1em;
      font-family: 'Hind Siliguri', sans-serif;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.8);
      color: #333;
      transition: all 0.2s ease;
    }
    
    input[type="text"]:focus {
      border-color: var(--primary-btn);
      outline: none;
      background: #fff;
    }

    /* থিম সিলেক্টর স্টাইল */
    .theme-selector {
      margin-bottom: 20px;
      text-align: left;
    }
    
    .theme-options {
      display: flex;
      gap: 15px;
      margin-top: 10px;
      justify-content: center;
    }
    
    .theme-dot {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.2s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .theme-dot:hover { transform: scale(1.1); }
    .theme-dot.active { border-color: var(--primary-blue); transform: scale(1.1); }
    
    .dot-1 { background: linear-gradient(135deg, #ffffff, #dcdde1); }
    .dot-2 { background: linear-gradient(135deg, #ffeaa7, #fab1a0); }
    .dot-3 { background: linear-gradient(135deg, #093028, #237A57); }

    #shareLink {
      word-break: break-all;
      background: #fff;
      color: #333;
      padding: 15px;
      border-radius: 8px;
      font-size: 1em;
      margin-top: 15px;
      display: none;
      font-weight: bold;
    }

    .cta-section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px dashed var(--border-color);
    }
  </style>
</head>
<body>

  <div class="app-card theme-1" id="mainCard">
    <div class="eid-label">✨ ইদ স্পেশাল সালামী কার্ড ✨</div>
    
    <h1>ঈদ মোবারক! 🌙</h1>
    <p id="subtitle">ঈদুল ফিতরের খুশি দ্বিগুণ হোক! তোমার স্পেশাল সালামী নিচে অপেক্ষা করছে।</p>
    
    <div id="mainButtons" class="btn-container">
      <button id="salamiBtn" class="btn btn-primary">সালামী গ্রহণ করুন 🎁</button>
      <button id="showCreateBtn" class="btn btn-secondary">সালামী পাঠান</button>
    </div>

    <div id="result">
      <div id="customInfo" class="info-box" style="display: none;">
        <p style="margin: 5px 0;"><strong>প্রেরক:</strong> <span id="displaySender"></span></p>
        <p style="margin: 5px 0;"><strong>প্রাপক:</strong> <span id="displayReceiver"></span></p>
      </div>
      <div id="finalMessage" class="funny-text"></div>
      <p class="ps-text">
        বি.দ্র: আমাকে উল্টা সালামী দিতে চাইলে ইনবক্সে বিকাশ নাম্বার দেওয়া হবে। 😜
      </p>
      
      <div class="cta-section">
        <p style="font-size: 1.1em; margin-bottom: 15px; font-weight: 600;">বন্ধুদের বোকা বানাতে চান?</p>
        <button id="goHomeBtn" class="btn btn-secondary" style="font-size: 1.1em; padding: 12px 20px;">আপনিও ডিজিটাল সালামী পাঠান 🚀</button>
      </div>
    </div>

    <div id="createSection">
      <h2 style="margin-bottom: 20px; font-weight: 700;">ডিজিটাল সালামী বাক্স</h2>
      
      <div class="theme-selector">
        <label class="form-label" style="text-align: center;">কার্ডের ডিজাইন বেছে নিন:</label>
        <div class="theme-options">
          <div class="theme-dot dot-1 active" data-theme="1"></div>
          <div class="theme-dot dot-2" data-theme="2"></div>
          <div class="theme-dot dot-3" data-theme="3"></div>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="senderInput">প্রেরক</label>
        <input type="text" id="senderInput" placeholder="আপনার নাম...">
      </div>
      
      <div class="form-group">
        <label class="form-label" for="receiverInput">প্রাপক</label>
        <input type="text" id="receiverInput" placeholder="বন্ধুর নাম...">
      </div>
      
      <div class="form-group">
        <label class="form-label" for="customMsgInput">সালামী মেসেজ</label>
        <input type="text" id="customMsgInput" placeholder="আপনার সালামী মেসেজ...">
      </div>
      
      <button id="generateBtn" class="btn btn-primary">লিংক জেনারেট করুন</button>
      <div id="shareLink"></div>
      <button id="copyBtn" class="btn btn-secondary" style="display: none; margin-top: 15px;">লিংক কপি করুন 📋</button>
    </div>
  </div>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzQMbSzFwjLyDk5CH606IUW_OmB3w-iQR3Iet9PqFCNAkKtfolJrdndwvSpNzDljGLNFA/exec';

    function recordData(actionName, senderName, receiverName, messageText) {
      if (!scriptURL) return;

      let formData = new FormData();
      formData.append('action', actionName);
      formData.append('sender', senderName);
      formData.append('receiver', receiverName);
      formData.append('message', messageText);

      fetch(scriptURL, { method: 'POST', body: formData })
        .then(response => console.log('Data recorded securely!'))
        .catch(error => console.error('Error!', error.message));
    }

    const randomMessages = [
      "অত্যন্ত দুঃখের সাথে জানানো যাচ্ছে যে, দাতার পকেট বর্তমানে সম্পূর্ণ ফাঁকা! 😭",
      "ঈদের শপিং করতে গিয়ে দেউলিয়া হয়ে গেছি! তাই সালামী বন্ধ! 🛍️",
      "ডিজিটাল যুগে সালামীও ডিজিটাল! এই নাও তোমার ভার্চুয়াল সালামী: 💸 (ক্যাশআউট করা যাবে শ্রেষ্ঠ)",
      "তুমি এখন বড় হয়ে গেছো! এখন তোমার সালামী দেওয়ার বয়স, নেওয়ার নয়! 😠",
      "সিস্টেম এরর! আপনার সালামী অন্য অ্যাকাউন্টে ট্রান্সফার হয়ে গেছে! 🚫",
      "সালামীর বদলে এক বাটি সেমাইয়ের দাওয়াত রইলো! চলে এসো! 🍜",
      "বিকাশ বা নগদ সার্ভার ডাউন! তাই সালামী দেওয়া সম্ভব হচ্ছে না। 📵",
      "এত বড় হয়ে সালামী চাইতে লজ্জা করে না? যাও গিয়ে বই পড়ো! 📚",
      "সালামী লোডিং... ৯৯% এ গিয়ে আটকে গেছে! কিছুক্ষণ পর আবার চেষ্টা করুন। ⏳"
    ];

    const urlParams = new URLSearchParams(window.location.search);
    const urlMessage = urlParams.get('m');

    let customData = null;
    let currentSelectedTheme = "1";
    
    const mainCard = document.getElementById('mainCard');
    const themeDots = document.querySelectorAll('.theme-dot');

    themeDots.forEach(dot => {
      dot.addEventListener('click', function() {
        themeDots.forEach(d => d.classList.remove('active'));
        this.classList.add('active');
        currentSelectedTheme = this.getAttribute('data-theme');
        mainCard.className = `app-card theme-${currentSelectedTheme}`;
      });
    });
    
    if (urlMessage) {
      document.getElementById('showCreateBtn').style.display = 'none';
      try {
        const decodedString = decodeURIComponent(atob(urlMessage));
        customData = JSON.parse(decodedString);
        if(customData.t) {
           mainCard.className = `app-card theme-${customData.t}`;
        }
      } catch (e) {
        console.log("Invalid custom link");
      }
    }

    document.getElementById('salamiBtn').addEventListener('click', function() {
      confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });

      document.getElementById('mainButtons').style.display = 'none';
      document.getElementById('subtitle').style.display = 'none';
      document.getElementById('createSection').style.display = 'none';
      
      const resultDiv = document.getElementById('result');
      const finalMsgDiv = document.getElementById('finalMessage');
      const customInfoDiv = document.getElementById('customInfo');

      if (customData) {
        document.getElementById('displaySender').innerText = customData.s || "অজানা দাতা";
        document.getElementById('displayReceiver').innerText = customData.r || "অজানা প্রাপক";
        finalMsgDiv.innerText = customData.m || "মেসেজটি পড়া যাচ্ছে না! 😢";
        customInfoDiv.style.display = 'block';
        
        recordData("সালামী লিংকে ক্লিক", customData.s, customData.r, customData.m);
      } else {
        const randomIndex = Math.floor(Math.random() * randomMessages.length);
        const randMsg = randomMessages[randomIndex];
        finalMsgDiv.innerText = randMsg;
        
        recordData("র‍্যান্ডম লিংকে ক্লিক", "সিস্টেম", "ভিজিটর", randMsg);
      }

      resultDiv.style.display = 'block';
    });

    document.getElementById('showCreateBtn').addEventListener('click', function() {
      document.getElementById('createSection').style.display = 'block';
      this.style.display = 'none';
    });

    document.getElementById('goHomeBtn').addEventListener('click', function() {
      window.location.href = window.location.href.split('?')[0];
    });

    function fallbackLongUrl(url, sender, receiver, msg) {
      const shareLinkDiv = document.getElementById('shareLink');
      const copyBtn = document.getElementById('copyBtn');
      shareLinkDiv.innerText = url;
      copyBtn.style.display = 'inline-block';
      recordData("নতুন লিংক তৈরি (Long Error Fallback)", sender, receiver, msg);
      
      copyBtn.onclick = function() {
        navigator.clipboard.writeText(url).then(() => {
          copyBtn.innerText = "কপি হয়েছে! ✔️";
          setTimeout(() => copyBtn.innerText = "লিংক কপি করুন 📋", 2000);
        });
      };
    }

    document.getElementById('generateBtn').addEventListener('click', function() {
      const senderVal = document.getElementById('senderInput').value.trim();
      const receiverVal = document.getElementById('receiverInput').value.trim();
      const msgVal = document.getElementById('customMsgInput').value.trim();
      
      if (!msgVal) {
        alert("অন্তত একটি কাস্টম মেসেজ লিখুন!");
        return;
      }

      const payload = JSON.stringify({ s: senderVal, r: receiverVal, m: msgVal, t: currentSelectedTheme });
      const encodedMsg = btoa(encodeURIComponent(payload));
      
      const baseUrl = window.location.href.split('?')[0];
      const longUrl = baseUrl + '?m=' + encodedMsg;

      const shareLinkDiv = document.getElementById('shareLink');
      const copyBtn = document.getElementById('copyBtn');
      
      shareLinkDiv.innerText = "লিংক শর্ট করা হচ্ছে... ⏳";
      shareLinkDiv.style.display = 'block';
      copyBtn.style.display = 'none';

      const callbackName = 'isgd_callback_' + Math.round(100000 * Math.random());
      
      window[callbackName] = function(data) {
        delete window[callbackName];
        if (data && data.shorturl) {
          shareLinkDiv.innerText = data.shorturl;
          copyBtn.style.display = 'inline-block';
          recordData("নতুন লিংক তৈরি (Short is.gd)", senderVal, receiverVal, msgVal);
          
          copyBtn.onclick = function() {
            navigator.clipboard.writeText(data.shorturl).then(() => {
              copyBtn.innerText = "কপি হয়েছে! ✔️";
              setTimeout(() => copyBtn.innerText = "লিংক কপি করুন 📋", 2000);
            });
          };
        } else {
          fallbackLongUrl(longUrl, senderVal, receiverVal, msgVal);
        }
      };

      const script = document.createElement('script');
      script.src = `https://is.gd/create.php?format=json&url=${encodeURIComponent(longUrl)}&callback=${callbackName}`;
      script.onerror = function() { fallbackLongUrl(longUrl, senderVal, receiverVal, msgVal); };
      document.body.appendChild(script);
    });
  </script>
</body>
</html>
