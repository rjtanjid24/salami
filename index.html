<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ঈদুল ফিতর | সালামী অ্যাপ</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <style>
    /* Global Styles */
    :root {
      --primary-orange: #E67E22;
      --primary-orange-hover: #D35400;
      --primary-blue: #3498db;
      --primary-blue-hover: #2980b9;
      --bg-light: #FFFBF0;
      --card-white: #FFFFFF;
      --text-main: #333333;
      --text-muted: #7f8c8d;
      --confetti-glow: rgba(230, 126, 34, 0.4);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #FFFDEB 0%, #FFF5DC 100%);
      font-family: 'Hind Siliguri', sans-serif;
      color: var(--text-main);
      text-align: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Main App Card */
    .app-card {
      background: var(--card-white);
      padding: 40px 25px;
      border-radius: 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
      transform: translateY(0px);
      animation: appCardFloat 6s ease-in-out infinite;
      position: relative;
    }

    @keyframes appCardFloat {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    /* Header & Subtitle */
    h1 {
      color: var(--primary-orange);
      font-size: 2.2em;
      font-weight: 700;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .eid-label {
      font-size: 0.5em;
      font-weight: 400;
      color: var(--text-muted);
      margin-bottom: 25px;
    }

    p#subtitle {
      font-size: 1.2em;
      line-height: 1.6;
      font-weight: 500;
      margin-bottom: 35px;
      color: #555;
    }

    /* Buttons */
    .btn-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 25px;
    }

    .btn {
      color: white;
      border: none;
      padding: 18px 30px;
      font-size: 1.25em;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 15px rgba(0,0,0,0.1);
      width: 100%;
      box-sizing: border-box;
      outline: none;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: linear-gradient(45deg, var(--primary-orange), var(--primary-orange-hover));
      box-shadow: 0 10px 25px var(--confetti-glow);
    }

    .btn-primary:hover {
      box-shadow: 0 12px 30px var(--confetti-glow);
    }

    .btn-secondary {
      background: linear-gradient(45deg, var(--primary-blue), var(--primary-blue-hover));
    }

    /* Sections: Result & Create */
    #result, #createSection {
      display: none;
      margin-top: 30px;
      padding: 20px;
      background: rgba(230, 126, 34, 0.03);
      border: 1px dashed var(--primary-orange);
      border-radius: 15px;
      animation: appPopUp 0.6s ease-out;
    }

    @keyframes appPopUp {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Result Details */
    .info-box {
      background: rgba(230, 126, 34, 0.08);
      padding: 15px;
      border-radius: 12px;
      text-align: left;
      margin-bottom: 20px;
      font-size: 1.1em;
      color: #444;
    }
    
    .funny-text {
      color: #c0392b;
      font-weight: 700;
      font-size: 1.45em;
      margin: 20px 0;
      line-height: 1.4;
    }
    
    .ps-text {
      font-size: 1em;
      color: var(--text-muted);
      margin-top: 20px;
      font-style: italic;
    }

    /* Input Fields for Create Section */
    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }
    
    .form-label {
      font-weight: 600;
      font-size: 1.1em;
      margin-bottom: 8px;
      display: block;
      color: #444;
    }

    input[type="text"] {
      width: 100%;
      padding: 15px 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 1.1em;
      font-family: 'Hind Siliguri', sans-serif;
      box-sizing: border-box;
      background: #F9FAFB;
      transition: all 0.2s ease;
    }
    
    input[type="text"]:focus {
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
      background: white;
      outline: none;
    }

    #shareLink {
      word-break: break-all;
      background: #F0F4F8;
      padding: 15px;
      border-radius: 8px;
      font-size: 1em;
      margin-top: 15px;
      display: none;
      color: #2D3436;
      border: 1px solid #ddd;
    }
  </style>
</head>
<body>

  <div class="app-card">
    <div class="eid-label">ঈদুল ফিতর ২০২৬</div>
    
    <h1>ঈদ মোবারক! 🌙</h1>
    <p id="subtitle">ঈদুল ফিতরের খুশি দ্বিগুণ হোক! তোমার স্পেশাল সালামী নিচে অপেক্ষা করছে।</p>
    
    <div id="mainButtons" class="btn-container">
      <button id="salamiBtn" class="btn btn-primary">সালামী গ্রহণ করুন 🎁</button>
      <button id="showCreateBtn" class="btn btn-secondary">সালামী পাঠান</button>
    </div>

    <div id="result">
      <div id="customInfo" class="info-box" style="display: none;">
        <p style="margin: 5px 0;"><strong>প্রেরক:</strong> <span id="displaySender"></span></p>
        <p style="margin: 5px 0;"><strong>প্রাপক:</strong> <span id="displayReceiver"></span></p>
      </div>
      <div id="finalMessage" class="funny-text"></div>
      <p class="ps-text">
        বি.দ্র: আমাকে উল্টা সালামী দিতে চাইলে ইনবক্সে বিকাশ নাম্বার দেওয়া হবে। 😜
      </p>
    </div>

    <div id="createSection">
      <h2 style="margin-bottom: 25px; color: var(--text-main); font-weight: 700;">ডিজিটাল সালামী বাক্স</h2>
      
      <div class="form-group">
        <label class="form-label" for="senderInput">আপনার নাম (প্রেরক)</label>
        <input type="text" id="senderInput" placeholder="উদা: আপনার নাম">
      </div>
      
      <div class="form-group">
        <label class="form-label" for="receiverInput">বন্ধুর নাম (প্রাপক)</label>
        <input type="text" id="receiverInput" placeholder="উদা: বন্ধুর নাম">
      </div>
      
      <div class="form-group">
        <label class="form-label" for="customMsgInput">সালামী মেসেজ</label>
        <input type="text" id="customMsgInput" placeholder="উদা: আপনার সালামী মেসেজ...">
      </div>
      
      <button id="generateBtn" class="btn btn-secondary">লিংক জেনারেট করুন</button>
      <div id="shareLink"></div>
      <button id="copyBtn" class="btn btn-primary" style="display: none; margin-top: 15px;">লিংক কপি করুন 📋</button>
    </div>
  </div>

  <script>
    // আপনার Apps Script URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzQMbSzFwjLyDk5CH606IUW_OmB3w-iQR3Iet9PqFCNAkKtfolJrdndwvSpNzDljGLNFA/exec';

    function recordData(actionName, senderName, receiverName, messageText) {
      if (!scriptURL) return;

      let formData = new FormData();
      formData.append('action', actionName);
      formData.append('sender', senderName);
      formData.append('receiver', receiverName);
      formData.append('message', messageText);

      fetch(scriptURL, { method: 'POST', body: formData })
        .then(response => console.log('Data recorded securely!'))
        .catch(error => console.error('Error!', error.message));
    }

    const randomMessages = [
      "অত্যন্ত দুঃখের সাথে জানানো যাচ্ছে যে, দাতার পকেট বর্তমানে সম্পূর্ণ ফাঁকা! 😭",
      "ঈদের শপিং করতে গিয়ে দেউলিয়া হয়ে গেছি! তাই সালামী বন্ধ! 🛍️",
      "ডিজিটাল যুগে সালামীও ডিজিটাল! এই নাও তোমার ভার্চুয়াল সালামী: 💸 (ক্যাশআউট করা যাবে না)",
      "তুমি এখন বড় হয়ে গেছো! এখন তোমার সালামী দেওয়ার বয়স, নেওয়ার নয়! 😠",
      "সিস্টেম এরর! আপনার সালামী অন্য অ্যাকাউন্টে ট্রান্সফার হয়ে গেছে! 🚫",
      "সালামীর বদলে এক বাটি সেমাইয়ের দাওয়াত রইলো! চলে এসো! 🍜",
      "বিকাশ বা নগদ সার্ভার ডাউন! তাই সালামী দেওয়া সম্ভব হচ্ছে না। 📵",
      "এত বড় হয়ে সালামী চাইতে লজ্জা করে না? যাও গিয়ে বই পড়ো! 📚",
      "সালামী লোডিং... ৯৯% এ গিয়ে আটকে গেছে! কিছুক্ষণ পর আবার চেষ্টা করুন। ⏳"
    ];

    const urlParams = new URLSearchParams(window.location.search);
    const urlMessage = urlParams.get('m');

    let customData = null;
    
    if (urlMessage) {
      document.getElementById('showCreateBtn').style.display = 'none';
      try {
        const decodedString = decodeURIComponent(atob(urlMessage));
        customData = JSON.parse(decodedString);
      } catch (e) {
        console.log("Invalid custom link");
      }
    }

    document.getElementById('salamiBtn').addEventListener('click', function() {
      confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });

      document.getElementById('mainButtons').style.display = 'none';
      document.getElementById('subtitle').style.display = 'none';
      document.getElementById('createSection').style.display = 'none';
      
      const resultDiv = document.getElementById('result');
      const finalMsgDiv = document.getElementById('finalMessage');
      const customInfoDiv = document.getElementById('customInfo');

      if (customData) {
        document.getElementById('displaySender').innerText = customData.s || "অজানা দাতা";
        document.getElementById('displayReceiver').innerText = customData.r || "অজানা প্রাপক";
        finalMsgDiv.innerText = customData.m || "মেসেজটি পড়া যাচ্ছে না! 😢";
        customInfoDiv.style.display = 'block';
        
        recordData("সালামী লিংকে ক্লিক", customData.s, customData.r, customData.m);
      } else {
        const randomIndex = Math.floor(Math.random() * randomMessages.length);
        const randMsg = randomMessages[randomIndex];
        finalMsgDiv.innerText = randMsg;
        
        recordData("র‍্যান্ডম লিংকে ক্লিক", "সিস্টেম", "ভিজিটর", randMsg);
      }

      resultDiv.style.display = 'block';
    });

    document.getElementById('showCreateBtn').addEventListener('click', function() {
      document.getElementById('createSection').style.display = 'block';
      this.style.display = 'none';
    });

    document.getElementById('generateBtn').addEventListener('click', function() {
      const senderVal = document.getElementById('senderInput').value.trim();
      const receiverVal = document.getElementById('receiverInput').value.trim();
      const msgVal = document.getElementById('customMsgInput').value.trim();
      
      if (!msgVal) {
        alert("অন্তত একটি কাস্টম মেসেজ লিখুন!");
        return;
      }

      const payload = JSON.stringify({ s: senderVal, r: receiverVal, m: msgVal });
      const encodedMsg = btoa(encodeURIComponent(payload));
      
      const baseUrl = window.location.href.split('?')[0];
      const longUrl = baseUrl + '?m=' + encodedMsg;

      const shareLinkDiv = document.getElementById('shareLink');
      const copyBtn = document.getElementById('copyBtn');
      
      shareLinkDiv.innerText = "লিংক শর্ট করা হচ্ছে... ⏳";
      shareLinkDiv.style.display = 'block';
      copyBtn.style.display = 'none';

      fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`)
        .then(response => response.text())
        .then(shortUrl => {
          shareLinkDiv.innerText = shortUrl;
          copyBtn.style.display = 'inline-block';
          
          recordData("নতুন লিংক তৈরি (Short)", senderVal, receiverVal, msgVal);
          
          copyBtn.onclick = function() {
            navigator.clipboard.writeText(shortUrl).then(() => {
              copyBtn.innerText = "কপি হয়েছে! ✔️";
              setTimeout(() => copyBtn.innerText = "লিংক কপি করুন 📋", 2000);
            });
          };
        })
        .catch(error => {
          console.error("Shortening failed, using long URL", error);
          shareLinkDiv.innerText = longUrl;
          copyBtn.style.display = 'inline-block';
          
          recordData("নতুন লিংক তৈরি (Long)", senderVal, receiverVal, msgVal);
          
          copyBtn.onclick = function() {
            navigator.clipboard.writeText(longUrl).then(() => {
              copyBtn.innerText = "কপি হয়েছে! ✔️";
              setTimeout(() => copyBtn.innerText = "লিংক কপি করুন 📋", 2000);
            });
          };
        });
    });
  </script>
</body>
</html>
